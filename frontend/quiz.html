<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz</title>
  <link rel="stylesheet" href="./css/styles.css?v=5" />
</head>
<body>
  <main class="container">
    <nav class="quiz-top-nav" aria-label="Nawigacja quizu">
      <a class="quiz-menu-tile" href="./index.html">
        <span class="quiz-menu-icon" aria-hidden="true">&#8592;</span>
        <span>Menu quiz&oacute;w</span>
      </a>
    </nav>

    <div id="status">&#321;adowanie quizu...</div>

    <section id="quiz-screen" class="hidden">
      <h1 id="quiz-title"></h1>
      <p id="quiz-description"></p>

      <div class="question-card">
        <p id="question-counter"></p>
        <div
          id="question-progress-track"
          class="question-progress-track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div id="question-progress-bar" class="question-progress-bar"></div>
        </div>
        <p id="question-progress-percent" class="question-progress-percent"></p>
        <p id="question-hint" class="question-hint hidden"></p>
        <div id="question-source" class="question-source hidden"></div>
        <h2 id="question-text"></h2>

        <div id="question-image-wrapper" class="question-image-wrapper hidden">
          <img id="question-image" class="question-image hidden" alt="Obrazek do pytania" />
        </div>

        <div id="answers" class="answers"></div>

        <div id="open-answer-box" class="hidden open-answer-box">
          <input id="open-answer-input" type="text" placeholder="Wpisz odpowied&#378;" />
        </div>

        <div id="feedback" class="feedback hidden"></div>

        <div class="actions">
          <button id="check-button" class="hidden">Sprawd&#378;</button>
          <button id="next-button" class="hidden">Dalej</button>
        </div>
      </div>
    </section>

    <section id="result-screen" class="hidden">
      <div class="question-card result-card">
        <div id="result-emoji" class="result-emoji">🎉</div>
        <h2>Koniec quizu</h2>

        <div class="result-grid">
          <div class="result-tile">
            <div class="result-label">Wynik</div>
            <div id="final-score" class="result-value"></div>
          </div>

          <div class="result-tile">
            <div class="result-label">Procent</div>
            <div id="final-percentage" class="result-value"></div>
          </div>

          <div class="result-tile">
            <div class="result-label">Ocena</div>
            <div id="final-grade" class="result-value"></div>
          </div>

          <div class="result-tile result-tile-wide">
            <div class="result-label">Komunikat</div>
            <div id="final-message" class="result-value"></div>
          </div>
        </div>

        <div class="result-actions">
          <button id="restart-button" type="button">Zagraj jeszcze raz</button>
          <a class="result-list-tile" href="./index.html">
            <span class="result-list-icon" aria-hidden="true">&#8592;</span>
            <span>
              <span class="result-list-title">Lista quiz&oacute;w</span>
              <span class="result-list-subtitle">Wybierz inny zestaw</span>
            </span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/config.js?v=3"></script>
  <script src="./js/api.js?v=3"></script>
  <script src="./js/utils.js?v=3"></script>
  <script src="./js/quiz-state.js?v=3"></script>
  <script src="./js/quiz-check.js?v=7"></script>
  <script src="./js/quiz-render.js?v=7"></script>
  <script src="./js/quiz-events.js?v=3"></script>
  <script src="./js/quiz-page.js?v=3"></script>
</body>
</html>
