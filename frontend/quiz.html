<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="container">
    <a href="./index.html">← Powrót do listy quizów</a>

    <div id="status">Ładowanie quizu...</div>

    <section id="quiz-screen" class="hidden">
      <h1 id="quiz-title"></h1>
      <p id="quiz-description"></p>

      <div class="question-card">
        <p id="question-counter"></p>
        <h2 id="question-text"></h2>

      <div id="question-image-wrapper" class="question-image-wrapper hidden">
        <img id="question-image" class="question-image hidden" alt="Obrazek do pytania" />
      </div>

      <div id="answers" class="answers"></div>

      <div id="open-answer-box" class="hidden open-answer-box">
        <input id="open-answer-input" type="text" placeholder="Wpisz odpowiedź" />
      </div>



        <div id="feedback" class="feedback hidden"></div>

        <div class="actions">
          <button id="check-button" class="hidden">Sprawdź</button>
          <button id="next-button" class="hidden">Dalej</button>
        </div>
      </div>
    </section>

    <section id="result-screen" class="hidden">
      <div class="question-card">
        <h2>Koniec quizu</h2>
        <p id="final-score"></p>
        <p id="final-message"></p>
        <button onclick="window.location.reload()">Zagraj jeszcze raz</button>
      </div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/quiz.js"></script>
</body>
</html>
