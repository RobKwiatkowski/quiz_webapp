<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matematyka - Quiz na Sz&oacute;stk&#281;</title>
  <link rel="stylesheet" href="./css/styles.css?v=10" />
</head>
<body>
  <main class="container">
    <nav class="quiz-top-nav" aria-label="Nawigacja">
      <a class="quiz-menu-tile" href="./index.html">
        <span class="quiz-menu-icon" aria-hidden="true">&#8592;</span>
        <span>Menu g&#322;&oacute;wne</span>
      </a>
    </nav>

    <section class="question-card math-question-card" aria-labelledby="math-title">
      <p class="question-hint">Matematyka</p>
      <h1 id="math-title">Zadanie generowane przez LLM</h1>
      <div id="math-status">&#321;adowanie zadania...</div>

      <div id="math-question-box" class="hidden">
        <p id="math-question-instruction" class="question-hint"></p>
        <h2 id="math-question-text"></h2>

        <div class="open-answer-box">
          <input id="math-answer-input" type="text" placeholder="Wpisz odpowied&#378;" />
        </div>

        <div class="actions">
          <button id="math-check-button" type="button">Sprawd&#378;</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/config.js?v=10"></script>
  <script src="./js/api.js?v=10"></script>
  <script>
    async function initMathQuestionPage() {
      const statusEl = document.getElementById("math-status");
      const questionBoxEl = document.getElementById("math-question-box");
      const instructionEl = document.getElementById("math-question-instruction");
      const questionTextEl = document.getElementById("math-question-text");

      try {
        const question = await getMathQuestion();

        questionTextEl.textContent = question.text || "Brak tre\u015bci zadania.";
        instructionEl.textContent = question.instruction || "";
        statusEl.classList.add("hidden");
        questionBoxEl.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Serwer LLM niedost\u0119pny.";
        questionBoxEl.classList.add("hidden");
      }
    }

    initMathQuestionPage();
  </script>
</body>
</html>
