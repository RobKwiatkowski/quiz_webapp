services:
  backend:
    build: ./backend
    container_name: quiz-backend
    restart: unless-stopped
    environment:
      APP_ENV: prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: quiz-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
