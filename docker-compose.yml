services:
  backend:
    build: ./backend
    container_name: quiz-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: quiz-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend